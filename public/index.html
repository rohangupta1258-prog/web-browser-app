<!DOCTYPE html>
<html>
<head>
    <title>Simple Web Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌐 Mini Web Browser</h1>

        <form action="/browse" method="POST">
            <input 
                type="text" 
                name="url" 
                placeholder="Enter URL (e.g. google.com)" 
                required
            >
            <button type="submit">Search</button>
        </form>
    </div>

</body>
</html>
